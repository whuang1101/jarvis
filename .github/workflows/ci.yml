name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package with dev deps
        run: pip install -e ".[dev]"
      - name: Run test suite
        run: python -m pytest jarvis/tests -q
      - name: Byte-compile all sources
        run: python -m compileall -q jarvis

  build:
    name: build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Smoke-test wheel installs and entry point resolves
        run: |
          pip install dist/*.whl
          python -c "from jarvis.cli import main; print('entry point OK')"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

  deploy:
    name: deploy to learning-vm
    # Only on main pushes, and only once the VM_SSH_KEY secret exists
    # (see scripts/SETUP-VM.md § "Enable CI deploy").
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [test, build]
    env:
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
      VM_HOST: ${{ secrets.VM_HOST }}
    steps:
      - name: Skip if deploy secrets are not configured
        id: gate
        run: |
          if [ -z "$VM_SSH_KEY" ] || [ -z "$VM_HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "VM_SSH_KEY/VM_HOST secrets not set — skipping deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy over SSH
        if: steps.gate.outputs.configured == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "$VM_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=20 "azureuser@$VM_HOST" '
            set -e
            cd ~/jarvis
            git checkout main -q && git pull -q
            .venv/bin/pip install -q -e ".[dev]"
            .venv/bin/python -m pytest jarvis/tests -q
            echo "deployed $(git rev-parse --short HEAD)"
          '
