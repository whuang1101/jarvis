name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package with dev deps
        run: pip install -e ".[dev]"
      - name: Run test suite
        run: python -m pytest jarvis/tests -q
      - name: Byte-compile all sources
        run: python -m compileall -q jarvis

  build:
    name: build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Smoke-test wheel installs and entry point resolves
        run: |
          pip install dist/*.whl
          python -c "from jarvis.cli import main; print('entry point OK')"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14
